[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "vectorbtpro"
version = "2026.4.7"
description = "Next-Generation Quantitative Analysis Tool"
license = { file = "LICENSE" }
authors = [{ name = "Oleg Polakow", email = "olegpolakow@vectorbt.pro" }]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.20; python_version<'3.12'",
    "numpy>1.24.3; python_version>='3.12'",
    "pandas>=1.5.0, <3.0.0",
    "numba>=0.57.0",
    "scipy",
    "scikit-learn",
    "schedule",
    "requests",
    "tqdm",
    "python-dateutil",
    "dateparser",
    "imageio",
    "typing_extensions",
    "typer",
    "mypy_extensions",
    "humanize",
    "attrs>=21.1.0",
    "websocket-client",
    "tomli>=1.1.0; python_version<'3.11'",
]
classifiers = [
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "Intended Audience :: Information Technology",
    "Intended Audience :: Science/Research",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Topic :: Software Development",
    "Topic :: Office/Business :: Financial",
    "Topic :: Scientific/Engineering :: Information Analysis"
]

[project.urls]
homepage = "https://vectorbt.pro/"
documentation = "https://vectorbt.pro/documentation/"
repository = "https://github.com/polakowo/vectorbt.pro"

[project.scripts]
vbt = "vectorbtpro.cli:main"

[project.optional-dependencies]
data-base = [
    "tables",
    "SQLAlchemy>=2.0.0",
    "duckdb",
    "pyarrow",
    "yfinance>=0.2.56",
    "python-binance>=1.0.16"
]
data = [
    "vectorbtpro[data-base]",
    "duckdb-engine",
    "fastparquet",
    "alpaca-py>=0.40.0",
    "ccxt>=1.89.14",
    "polygon-api-client>=1.0.0",
    "beautifulsoup4",
    "nasdaq-data-link",
    "alpha_vantage>=3.0.0",
    "databento",
    "findatapy",
]
ind-base = [
    "TA-Lib"
]
ind = [
    "vectorbtpro[ind-base]",
    "pandas-ta-classic",
    "ta",
    "technical",
]
perf-base = [
    "numexpr"
]
perf = [
    "vectorbtpro[perf-base]",
    "Bottleneck"
]
opt-base = [
    "hyperopt",
    "optuna"
]
opt = [
    "vectorbtpro[opt-base]"
]
exec-base = [
    "pathos"
]
exec = [
    "vectorbtpro[exec-base]",
    "dask",
    "mpire",
    "ray>=1.4.1; sys_platform != 'win32'"
]
plot-base = [
    "matplotlib>=3.2.0",
    "plotly>=5.0.0",
    "ipywidgets>=7.0.0",
    "anywidget",
    "kaleido",
    "dash",
]
plot = [
    "vectorbtpro[plot-base]",
    "plotly-resampler",
]
pfopt-base = [
    "PyPortfolioOpt>=1.5.1",
    "Riskfolio-Lib>=3.3.0"
]
pfopt = [
    "vectorbtpro[pfopt-base]"
]
stats = [
    "quantstats>=0.0.37"
]
msg = [
    "python-telegram-bot"
]
io-base = [
    "dill",
    "blosc2",
    "platformdirs",
    "lmdbm"
]
io = [
    "vectorbtpro[io-base]",
    "lz4",
    "pyperclip"
]
knwl-base = [
    "tabulate",
    "ruamel.yaml",
    "tomlkit",
    "markdown",
    "Pygments",
    "openai",
    "tiktoken",
    "bm25s",
    "PyStemmer",
    "docstring_parser",
    "networkx",
    "sentence-transformers",
    "transformers",
]
knwl = [
    "vectorbtpro[knwl-base]",
    "PyGithub>=1.59.0",
    "jmespath",
    "jsonpath-ng",
    "fuzzysearch",
    "rapidfuzz",
    "nestedtext",
    "PyYAML",
    "litellm",
    "llama_index",
    "huggingface-hub",
    "google-genai",
    "anthropic",
    "ollama",
    "cohere",
    "voyageai",
]
mcp-base = [
    "mcp",
    "ipykernel"
]
mcp = [
    "vectorbtpro[mcp-base]"
]
base-no-talib = [
    "vectorbtpro[data-base,perf-base,opt-base,exec-base,plot-base,pfopt-base,io-base,knwl-base,mcp-base]"
]
base = [
    "vectorbtpro[base-no-talib,ind-base]"
]
all-stable = [
    "vectorbtpro[data,ind,perf,opt,exec,plot,pfopt,stats,msg,io,knwl,mcp]"
]
all = [
    "vectorbtpro[all-stable]",
    "universal-portfolios",
    "smartmoneyconcepts>0.0.10",
    "arcticdb",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["vectorbtpro", "vectorbtpro.*"]
namespaces = false
